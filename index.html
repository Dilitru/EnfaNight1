<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Quiz App Template</title>
  <!-- Google Font Nunito -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Logo Header -->
  <header>
    <img src="logo.png" alt="App Logo" height="60">
  </header>

  <!-- SPLASH CARD -->
  <div class="card splashCard">    
    <!-- Image button -->
    <button class="image-button">
      <img src="start-button.png" alt="Start Quiz">
    </button>
	<p>
	<br>Push to start</br>
  </div>
  
	<!-- WAIT PAGE CARD -->
	<div class="card waitPage">
	  <!-- Top section with full image -->
	  <div class="waitTop">
		
	  </div>

	  <!-- Brainflix logo overlapping both sections -->
	  <div class="waitLogo">
		<img src="start-button.png" alt="Brainflix Logo">
	  </div>

	  <!-- Bottom section with black background -->
	  <div class="waitBottom">
		<p>Will you proceed based on the instructions provided?</p>
		<button class="yesPlayButton">
		  <img src="yes-button.png" alt="Yes Play Button">
		</button>
	  </div>
	</div>
	
	<!------------------->
    <!-- QUESTION CARD -->
    <!------------------->
	<div class="card questionCard">
	  <!-- Top section -->
	  <div class="questionSection">
		<img src="start-button.png" alt="Logo" class="questionLogo">
		<h1 class="questionText">Question will be written here</h1>
	  </div>

	  <!-- Bottom section -->
	  <div class="answerSection">
		<button class="answerButton yesButton">
		  <img src="yes-button.png" alt="Yes Button">
		</button>
		<button class="answerButton noButton">
		  <img src="no-button.png" alt="No Button">
		</button>
		<p class="answerInstruction">Please select an answer</p>
	  </div>
	</div>

    <!---------------->
	<!-- Error Card -->
	<!---------------->
	<div class="card errorCard">
	  <p class="errorMessage">
		Please wait for the host's instructions before proceeding
	  </p>
	</div>
	
	<!--------------------------->
	<!-- Answer Submitted Card -->
	<!--------------------------->
	<!-- Answer Submitted Card -->
	<div class="card answerSubmittedCard">
	  <!-- Top section (reuse background if needed) -->
	  <div class="submittedTop"></div>

	  <!-- Logo overlapping -->
	  <div class="submittedLogo">
		<img src="start-button.png" alt="Brainflix Logo">
	  </div>

	  <!-- Bottom section -->
	  <div class="submittedBottom">
		<p>You answer was submitted.</p>
		<Button class="proceedButton"> Proceed </Button>
	  </div>
	</div>

    <!--------------------->
	<!-- Commitment Card -->
	<!--------------------->
	<div class="card commitmentCard">
	  <!-- Top section: fake power button -->
	  <div class="commitTop">
		<span class="fakeButton">⏻</span>
	  </div>

	  <!-- Middle section: real commitment button -->
	  <div class="commitMiddle">
		<button class="commitmentYesButton">
		  <img src="commitment-yes.png" alt="Commitment Yes Button">
		</button>
	  </div>

	  <!-- Bottom section: fake buttons -->
	  <div class="commitBottom">
		<span class="fakeButton">🔊</span>
		<span class="fakeButton">🔉</span>
		<span class="fakeButton">⏹️</span>
	  </div>
	  <div class="commitBottom">
		<span class="fakeButton">⬆️</span>
		<span class="fakeButton">⬇️</span>
		<span class="fakeButton">⏯️</span>
	  </div>
	</div>

	<!----------------->
	<!-- Reveal Card -->
	<!----------------->
	<!-- Reveal Card -->
	<div class="card revealCard">
	  <div class="glow"></div>
	  <div class="packshot"></div>
	  
	</div>


	<p style="font-size: 10px;">v051726-0125</p>
  <!-- External JS -->
  <script src="script.js"></script>
</body>
</html>
