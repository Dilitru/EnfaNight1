  <script>

//LEADERBOARD SYSTEM
function markStatus(index) {
  const statusRef = firebase.firestore().collection("status").doc("statusDoc");

  statusRef.get().then(doc => {
    if (doc.exists) {
      const currentStatus = doc.data().status || [];

      // Update only the chosen index
      currentStatus[index] = true;

      // Write the whole array back
      return statusRef.update({ status: currentStatus });
    } else {
      console.error("statusDoc not found!");
    }
  })
  .then(() => {
    console.log(`Status for question ${index} updated to TRUE`);
	document.getElementById("buttonPressedMessage").classList.remove("hidden");
	showLeaderboardForQuestion(index + 1);
  })
  .catch(error => {
    console.error("Error updating status:", error);
  });
}

function showLeaderboardForQuestion(questionNumber) {
  const typeString = String(questionNumber);

  setTimeout(() => {
    document.getElementById("buttonPressedMessage").classList.add("hidden");

    firebase.firestore()
      .collection("submissions")
      .where("type", "==", typeString)   // filter by question type
      .orderBy("timestamp", "asc")       // earliest first
      .limit(50)                         // pull first 50 results
      .get()
      .then(snapshot => {
        const leaderboardList = document.getElementById("leaderboardList");
        leaderboardList.innerHTML = ""; // clear old entries

        const seenTables = new Set();
        const displayResults = [];

        snapshot.forEach(doc => {
          const data = doc.data();
          if (!seenTables.has(data.tableNumber)) {
            seenTables.add(data.tableNumber);
            displayResults.push(data);
          }
        });

        // Only show the first 5 unique tables
        displayResults.slice(0, 5).forEach(entry => {
          const li = document.createElement("li");
          li.textContent = `Table ${entry.tableNumber}`;
          leaderboardList.appendChild(li);
        });

        console.log(`Leaderboard updated for Question ${questionNumber}`);
      })
      .catch(error => {
        console.error("Error fetching leaderboard:", error);
      });
  }, 2000); // wait 15 seconds
}


//RELOCK
function lockAllQuestions() {
  const statusRef = firebase.firestore().collection("status").doc("statusDoc");

  statusRef.get().then(doc => {
    if (doc.exists) {
      const currentStatus = doc.data().status || [];

      // Reset every index to false
      const newStatus = currentStatus.map(() => false);

      return statusRef.update({ status: newStatus });
    } else {
      console.error("statusDoc not found!");
    }
  })
  .then(() => {
    console.log("All questions locked (status array reset to false).");
  })
  .catch(error => {
    console.error("Error locking all questions:", error);
  });
}

// Attach to button
document.getElementById("lockAllBtn").addEventListener("click", lockAllQuestions);

function showLeaderboardAll() {
  firebase.firestore()
    .collection("submissions")
    .get()
    .then(snapshot => {
      const counts = {};

      // Count submissions per table
      snapshot.forEach(doc => {
        const data = doc.data();
        const table = data.tableNumber;

        if (!counts[table]) {
          counts[table] = 0;
        }
        counts[table] += 1;
      });

      // Sort by submission count (descending) and take top 5
      const sorted = Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);

      // Render leaderboard
      const leaderboardList = document.getElementById("leaderboardList");
      leaderboardList.innerHTML = "";

      sorted.forEach(([table]) => {
        const li = document.createElement("li");
        li.textContent = `Table ${table}`;
        leaderboardList.appendChild(li);
      });

      console.log("Leaderboard updated for ALL questions.");
    })
    .catch(error => {
      console.error("Error fetching ALL leaderboard:", error);
    });
}
